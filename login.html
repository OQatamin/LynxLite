<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynx Lite Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 2.5rem 2rem;
      width: 100%;
    }
    .role-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .role-btn {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: #f3f4f6;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
      font-size: 0.875rem;
    }
    .role-btn:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
    }
    .role-btn.selected {
      border-color: #3b82f6;
      background: #e0e7ff;
      color: #2563eb;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
    }
    .login-btn {
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      padding: 0.875rem 1.5rem;
      width: 100%;
      margin-top: 1.5rem;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .login-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .input-field {
      width: 100%;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      transition: all 0.2s ease;
      background: #fff;
    }
    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 1rem;
      text-align: center;
      padding: 0.75rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Lynx Lite</h1>
        <p class="text-gray-600">Sign in to your account</p>
      </div>
      
      <form id="login-form" autocomplete="off">
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="username">Username</label>
          <input id="username" type="text" class="input-field" placeholder="Enter your username" required>
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Password</label>
          <input id="password" type="password" class="input-field" placeholder="Enter your password" required>
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Select Role</label>
          <div class="role-select">
            <button type="button" class="role-btn" data-role="admin">
              <i class="fas fa-user-shield"></i>
              <span>Admin</span>
            </button>
            <button type="button" class="role-btn" data-role="fleet_manager">
              <i class="fas fa-users"></i>
              <span>Fleet Manager</span>
            </button>
            <button type="button" class="role-btn" data-role="owner">
              <i class="fas fa-user-tie"></i>
              <span>Owner</span>
            </button>
            <button type="button" class="role-btn" data-role="dispatcher">
              <i class="fas fa-shipping-fast"></i>
              <span>Dispatcher</span>
            </button>
            <button type="button" class="role-btn" data-role="driver">
              <i class="fas fa-id-card"></i>
              <span>Driver</span>
            </button>
            <button type="button" class="role-btn" data-role="accountant">
              <i class="fas fa-calculator"></i>
              <span>Accountant</span>
            </button>
          </div>
          <input type="hidden" id="selected-role" name="role" required>
        </div>
        
        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>
        
        <div id="error-msg" class="error-msg hidden"></div>
      </form>
    </div>
  </div>
  <script>
    // Role selection logic
    const roleBtns = document.querySelectorAll('.role-btn');
    const selectedRoleInput = document.getElementById('selected-role');
    roleBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        roleBtns.forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        selectedRoleInput.value = this.dataset.role;
      });
    });
    // Login logic (demo only)
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = selectedRoleInput.value;
      const errorMsg = document.getElementById('error-msg');
      if (!username || !password || !role) {
        errorMsg.textContent = 'Please fill in all fields and select a role.';
        errorMsg.classList.remove('hidden');
        return;
      }
      errorMsg.classList.add('hidden');
      // Simulate login and redirect
      fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password, role })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          let page = '';
          switch(role) {
            case 'admin': page = 'index.html'; break;
            case 'fleet_manager': page = 'Main Dashboard.html'; break;
            case 'owner': page = 'owner-dashboard.html'; break;
            case 'dispatcher': page = 'dispatcher-dashboard.html'; break;
            case 'driver': page = 'driver-dashboard.html'; break;
            case 'accountant': page = 'accountant-dashboard.html'; break;
            default: page = 'Main Dashboard.html';
          }
          window.location.href = page;
        } else {
          errorMsg.textContent = 'Invalid username, password, or role.';
          errorMsg.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
